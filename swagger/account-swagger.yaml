openapi: 3.0.1
info:
  title: Account Management API (WebFlux Functional)
  description: Api para la gestion de cuentas bancarias y transferencias, implementada con Spring WebFlux Functional Endpoints y conectada a PostgreSQL mediante R2DBC.
  version: v1.0.0
servers:
  - url: http://localhost:8080/ms-account
    description: URL a traves del API Gateway
  - url: http://localhost:8082
    description: URL directa al Microservicio (Local)
tags:
  - name: Accounts
    description: Operaciones CRUD y logica de negocio para la entidad Account.
  - name: Transfers
    description: Operaciones de transferencia de fondos entre cuentas.

components:
  schemas:
    Account:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: ID unico de la cuenta
          example: 1
        customerId:
          type: integer
          format: int64
          description: ID del cliente propietario de la cuenta
          example: 10
        accountNumber:
          type: string
          description: Numero de cuenta bancaria unico
          example: "0011-0422-0200839485"
        balance:
          type: number
          format: double
          description: Saldo actual en la cuenta
          example: 1500.50
        status:
          type: string
          description: Estado de la cuenta (ACTIVE, INACTIVE, BLOCKED).
          example: "ACTIVE"
        createdAt:
          type: string
          format: date-time
          description: Fecha de creacion del registro
          example: "2026-03-24T10:00:00Z"
        updatedAt:
          type: string
          format: date-time
          description: Fecha de ultima actualizacion del registro
          example: "2026-03-24T10:00:00Z"
      required:
        - customerId
        - accountNumber
        - balance

    TransferRequest:
      type: object
      properties:
        fromAccountId:
          type: integer
          format: int64
          description: ID de la cuenta origen
          example: 1
        toAccountId:
          type: integer
          format: int64
          description: ID de la cuenta destino
          example: 2
        amount:
          type: number
          format: double
          description: Monto a transferir
          example: 50.00
      required:
        - fromAccountId
        - toAccountId
        - amount

    ApiResponseAccount:
      type: object
      properties:
        data:
          $ref: '#/components/schemas/Account'
        message:
          type: string
          example: "OK"
        status:
          type: integer
          example: 200

    ApiResponseAccountList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Account'
        message:
          type: string
          example: "OK"
        status:
          type: integer
          example: 200

    ApiResponseError:
      type: object
      properties:
        data:
          type: object
          nullable: true
          example: null
        message:
          type: string
          example: "Account not found"
        status:
          type: integer
          example: 404

paths:
  /api/v1/accounts:
    get:
      tags:
        - Accounts
      summary: Obtener todas las cuentas
      operationId: getAllAccounts
      responses:
        '200':
          description: Lista de cuentas obtenida con exito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAccountList'
    post:
      tags:
        - Accounts
      summary: Crear una nueva cuenta
      operationId: createAccount
      requestBody:
        description: Datos minimos requeridos para registrar una cuenta
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customerId:
                  type: integer
                  format: int64
                  example: 10
                accountNumber:
                  type: string
                  example: "0011-0422-0200839485"
                balance:
                  type: number
                  format: double
                  example: 500.00
      responses:
        '201':
          description: Cuenta creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAccount'
        '500':
          description: Error de validacion o conflicto en la base de datos

  /api/v1/accounts/{id}:
    get:
      tags:
        - Accounts
      summary: Obtener cuenta por ID
      operationId: getAccountById
      parameters:
        - name: id
          in: path
          description: ID interno de la cuenta a buscar
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Cuenta encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAccount'
        '404':
          description: Cuenta no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'

  /api/v1/accounts/customer/{customerId}:
    get:
      tags:
        - Accounts
      summary: Buscar todas las cuentas asociadas a un Cliente
      operationId: getAccountsByCustomerId
      parameters:
        - name: customerId
          in: path
          description: El ID del cliente (ej. 10)
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Cuentas encontradas para el cliente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAccountList'
        '404':
          description: Cliente sin cuentas o no encontrado

  /api/v1/accounts/transfer:
    post:
      tags:
        - Transfers
      summary: Transferir fondos entre dos cuentas
      operationId: transferFunds
      requestBody:
        description: Detalles de la transferencia
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransferRequest'
      responses:
        '200':
          description: Transferencia exitosa
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
                  message:
                    type: string
                    example: "Transfer successful"
                  status:
                    type: integer
                    example: 200
        '400':
          description: Saldo insuficiente o cuentas invalidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'
        '500':
          description: Error procesando la transferencia en la base de datos
